name: Update Race Data

on:
  schedule:
    - cron: '0 3 * * *'  # daily at 03:00 UTC
  workflow_dispatch:      # allow manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install procyclingstats cloudscraper beautifulsoup4
      - run: |
          DATE_FROM=$(date -d "1 month ago" +%Y-%m-%d)
          DATE_TO=$(date -d "1 month" +%Y-%m-%d)
          python scripts/fetch_races.py --date-from "$DATE_FROM" --date-to "$DATE_TO"
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: update race data and startlists'
          file_pattern: 'src/data/**'
